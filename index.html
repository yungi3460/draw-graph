<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Math Tool PRO</title>

<script src="https://www.desmos.com/api/v1.6/calculator.js?apiKey=desmos"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  display: flex;
  height: 100vh;
}

#menu {
  width: 250px;
  background: #1e1e1e;
  color: white;
  padding: 10px;
  overflow-y: auto;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border: none;
  background: #333;
  color: white;
  cursor: pointer;
}

#calculator {
  flex: 1;
}

#panel {
  width: 260px;
  background: #f4f4f4;
  padding: 10px;
}

input {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
}
</style>
</head>

<body>

<div id="menu">
  <h3>📊 그래프</h3>
  <button onclick="addGraph()">그래프 추가</button>
  <button onclick="clearAll()">초기화</button>

  <h3>🧠 고급 기능</h3>
  <button onclick="derivative()">미분 그래프</button>
  <button onclick="integral()">적분 시각화</button>
  <button onclick="extrema()">극값 표시</button>
  <button onclick="intersection()">교점 찾기</button>
  <button onclick="animate()">애니메이션</button>

  <h3>📍 도형</h3>
  <button onclick="addPoint()">점</button>
</div>

<div id="calculator"></div>

<div id="panel">
  <h3>함수 입력</h3>
  <input id="func" placeholder="예: y=x^2">
  <button onclick="draw()">그리기</button>
</div>

<script>
const calc = Desmos.GraphingCalculator(
  document.getElementById('calculator'),
  { expressions: true, zoomButtons: true }
);

// 기본 그래프
function draw() {
  const f = document.getElementById("func").value;
  calc.setExpression({ id: "f", latex: f });
}

// 그래프 추가
function addGraph() {
  const f = prompt("함수 입력");
  if (f) calc.setExpression({ latex: f });
}

// 미분
function derivative() {
  const f = prompt("f(x) 입력 (예: x^2)");
  if (f) {
    calc.setExpression({ id:"f", latex: `f(x)=${f}` });
    calc.setExpression({ latex: `f'(x)` });
  }
}

// 적분 시각화
function integral() {
  const f = prompt("f(x) 입력");
  const a = prompt("시작값");
  const b = prompt("끝값");
  if (f && a && b) {
    calc.setExpression({ id:"f", latex:`f(x)=${f}` });
    calc.setExpression({
      latex:`\\int_{${a}}^{${b}} f(x) dx`
    });
  }
}

// 극값
function extrema() {
  const f = prompt("f(x) 입력");
  if (f) {
    calc.setExpression({ id:"f", latex:`f(x)=${f}` });
    calc.setExpression({
      latex:`\\left( x, f(x) \\right) \\text{ where } f'(x)=0`
    });
  }
}

// 교점
function intersection() {
  const f1 = prompt("첫번째 함수 (예: x^2)");
  const f2 = prompt("두번째 함수 (예: 2x+1)");
  if (f1 && f2) {
    calc.setExpression({ latex:`f(x)=${f1}` });
    calc.setExpression({ latex:`g(x)=${f2}` });
    calc.setExpression({
      latex:`\\left(x,f(x)\\right) \\text{ where } f(x)=g(x)`
    });
  }
}

// 애니메이션
function animate() {
  calc.setExpression({
    id:"a",
    latex:"a=1",
    sliderBounds:{min:-5,max:5,step:0.1}
  });
  calc.setExpression({
    latex:"y=a x^2"
  });
}

// 점
function addPoint() {
  const x = prompt("x값");
  const y = prompt("y값");
  if (x && y) {
    calc.setExpression({ latex:`(${x},${y})` });
  }
}

// 초기화
function clearAll() {
  calc.setBlank();
}
</script>

</body>
</html>
